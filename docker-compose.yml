services:
  localstack:
    image: localstack/snowflake
    container_name: localstack-snowflake
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:443:443"
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - "./localstack/init:/etc/localstack/init"
      - "localstack-vol:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      dbt-net:
        aliases:
          # Magic hostname the dbt-snowflake adapter uses for LocalStack.
          # By aliasing the localstack service to this name on the shared network,
          # the dbt container resolves it correctly without extra_hosts hacks.
          - snowflake.localhost.localstack.cloud

  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    container_name: dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    volumes:
      # Bind mount: live code edits without image rebuilds
      - "./dbt:/usr/app/dbt"
      # Shared log volume — step 2 agent mounts this read-only
      - "./logs/dbt:/usr/app/dbt/logs"
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - dbt-net

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MONITOR_WS_URL: ws://monitor:8765/ws/push
    volumes:
      # Read-only access to dbt logs (agent reads manifests + JSON logs)
      - "./logs/dbt:/usr/app/logs/dbt:ro"
      # Read-only access to dbt model SQL (agent reads source SQL)
      - "./dbt:/usr/app/dbt:ro"
      # Read-write: agent writes ticket files here
      - "./output/tickets:/usr/app/output/tickets"
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - dbt-net

  code-env:
    build:
      context: .
      dockerfile: code-env/Dockerfile
    container_name: code-env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL}
      MONITOR_WS_URL: ws://monitor:8765/ws/push
    volumes:
      # Read-only access to tickets (code-fix agent reads the failure ticket)
      - "./output/tickets:/usr/app/output/tickets:ro"
      # Read-only access to dbt logs (for additional context)
      - "./logs/dbt:/usr/app/logs/dbt:ro"
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - dbt-net

  # ── Live Agent Monitor ───────────────────────────────────────────────────────
  monitor:
    build: ./monitor
    container_name: monitor
    ports:
      - "3001:8765"
    volumes:
      - monitor-data:/app/data
    networks:
      - dbt-net
    restart: unless-stopped

volumes:
  localstack-vol:
  monitor-data:

networks:
  dbt-net:
    driver: bridge
